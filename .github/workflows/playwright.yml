name: Playwright Tests + Allure + Slack 

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 🚀 Slack Start Notification (IST TIME)
      - name: Slack Start Notification
        run: |
          IST_TIME=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M:%S IST')

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"🚀 Automation Test Started\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nBy: ${{ github.actor }}\nCommit: ${{ github.sha }}\nMessage: ${{ github.event.head_commit.message }}\nTime: ${IST_TIME}\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      #  Checkout Code
      - uses: actions/checkout@v4

      #  Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      #  Install Dependencies
      - name: Install Dependencies
        run: npm install

      #  Install Playwright Browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      #  Run Tests (Do not fail pipeline)
      - name: Run Playwright Tests
        run: npx playwright test || true

      #  Upload ONLY Failed Test Videos
      - name: Upload Failed Test Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-test-videos
          path: test-results/**/*.webm

      #  Debug JSON (optional)
      - name: Debug JSON
        run: cat results.json || echo "No results.json found"

      #  Parse Test Results
      - name: Parse Test Results
        id: results
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          if [ ! -f results.json ]; then
            echo "passed=0" >> $GITHUB_OUTPUT
            echo "failed=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          PASSED=$(jq '[.. | objects | select(.status?=="passed")] | length' results.json)
          FAILED=$(jq '[.. | objects | select(.status?=="failed")] | length' results.json)
          TOTAL=$((PASSED + FAILED))

          echo "passed=$PASSED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT

      #  Install Allure
      - name: Install Allure
        run: npm install -g allure-commandline --save-dev

      #  Generate Allure Report
      - name: Generate Allure Report
        run: allure generate allure-results --clean || true

      #  Deploy Report to GitHub Pages
      - name: Deploy Report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      #  Print Report URL
      - name: Print Report URL
        run: echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      #  Slack Final Notification (IST TIME)
      - name: Slack Final Notification
        if: always()
        run: |
          IST_TIME=$(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M:%S IST')

          STATUS="✅ Passed"
          if [ "${{ steps.results.outputs.failed }}" != "0" ]; then
            STATUS="❌ Failed"
          fi

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": { \"type\": \"plain_text\", \"text\": \"${STATUS} Test Execution\" }
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  { \"type\": \"mrkdwn\", \"text\": \"*Repo:*\n${{ github.repository }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Branch:*\n${{ github.ref_name }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*By:*\n${{ github.actor }}\" }
                ]
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  { \"type\": \"mrkdwn\", \"text\": \"*Total:*\n${{ steps.results.outputs.total }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Passed:*\n${{ steps.results.outputs.passed }}\" },
                  { \"type\": \"mrkdwn\", \"text\": \"*Failed:*\n${{ steps.results.outputs.failed }}\" }
                ]
              },
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"*Commit:* https://github.com/${{ github.repository }}/commit/${{ github.sha }}\"
                }
              },
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"*Time:* ${IST_TIME}\"
                }
              },
              {
                \"type\": \"actions\",
                \"elements\": [
                  {
                    \"type\": \"button\",
                    \"text\": { \"type\": \"plain_text\", \"text\": \"View Report\" },
                    \"url\": \"https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/\"
                  },
                  {
                    \"type\": \"button\",
                    \"text\": { \"type\": \"plain_text\", \"text\": \"View Logs\" },
                    \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                  }
                ]
              }
            ]
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}